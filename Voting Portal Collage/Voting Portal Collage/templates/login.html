<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="icon" type="image/png" href="{{url_for('static', filename='images/voting_portal.png')}}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static', filename='css/style.css')}}">
</head>

<body class=" bg-light">
    <input type="hidden" value="{{ statusCode }}" id="loginStatus">
    <div class=" loginBlock">
        <div class="row justify-content-center min-vh-100  align-items-center">
            <div class="col-md-6 col-sm-4 col-lg-4">
                <div class="card border-0 shadow-lg">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-10 fw-bold ">Voting Portal</h2>
                        <form class="mt-5" action="/authentication" method="post">
                            <div class="form-floating mb-3">
                                <div class="input-group mt-5">
                                    <input type="text" class="form-control" id="email" placeholder="username"
                                        name="username" required>
                                </div>
                            </div>
                            <div class="form-floating mb-3">
                                <div class="input-group">
                                    <input type="password" class="form-control" id="password" placeholder="Password"
                                        name="password" required>
                               

                                </div>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="remember" required>
                                    <label class="form-check-label" for="remember">I agree with Terms &
                                        Conditions</label>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Login</button>
                        </form>

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="form-check">
                                <label class="form-check-label" for="remember">New User? <a href="{{ url_for('login.register_page') }}">Register Here </a></label>
                            </div>
                        </div>



                    </div>
                </div>
            </div>
            <div class="row  flex-row-reverse justify-content-start" style=" z-index: 1000;">
                <div class="alert alert-danger col-4 mt-5" role="alert" id="errorAlert" style="display: none;">
                    <strong>Error!</strong> <span id="errorText"></span>
                </div>
                <div class="alert alert-success col-4 mt-5" role="alert" id="successAlert" style="display: none;">
                    <strong>Success!</strong> <span id="successText"></span>

                </div>
            </div>
        </div>


    </div>



    <div class="row footer">
        <img src="{{url_for('static', filename='images/loginPageBackground.webp')}}" alt="footer" class="img-fluid">
    </div>




</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
    integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
    crossorigin="anonymous"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<!-- <script type="module" src="{{url_for('static', filename='js/showNotification.js')}}">    </script> -->
<script type="module" src="{{url_for('static', filename='js/login.js')}}">    </script>
<!-- <script type="module" src="{{url_for('static', filename='js/login.js')}}">    </script> -->



</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static', filename='css/style.css')}}">
</head>

<body class=" bg-light">
    <input type="hidden" value="{{ statusCode }}" id="loginStatus">
    <div class=" loginBlock">
        <div class="row justify-content-center min-vh-100  align-items-center">
            <div class="col-md-6 col-sm-4 col-lg-4">
                <div class="card border-0 shadow-lg">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-10 fw-bold ">Registration</h2>
                        <form id="addUserForm">

                            <div id="userFormAddUpdate">
                                <div class="mb-3">
                                    <label for="firstName" class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="userFirstName" placeholder="First Name"
                                        required>
                                </div>
                                <div class="mb-3">
                                    <label for="lastName" class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="userLastName" placeholder="Last Name"
                                        required>
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email address</label>
                                    <input type="email" class="form-control" id="userEmail"
                                        placeholder="name@example.com" required>
                                </div>
                                <div class="mb-3">
                                    <label for="userPRN" class="form-label">PRN No</label>
                                    <input type="text" class="form-control" id="userPRN"
                                        placeholder="PRN No" required>
                                </div>
                                <div class="mb-3">
                                    <label for="contactNo" class="form-label">Contact No</label>
                                    <input type="text" class="form-control" id="userContactNo" placeholder="Contact No"
                                        required>
                                </div>
                              
                                
                            </div>
                            <div class="mb-3"></div>
                           
                            <div class="modal-footer mt-3">
                                <button type="submit" class="btn btn-success mt-3"
                                    id="submitUserForm" userid="0">Register</button>
                               
                            </div>
                        </form>
<!-- 
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="form-check">
                                <label class="form-label" for="remember">Return to <a href="{{ url_for('login.login_page') }}">Login </a></label>
                            </div>
                        </div> -->



                    </div>
                </div>
            </div>
            <div class="row  flex-row-reverse justify-content-start" style=" z-index: 1000;">
                <div class="alert alert-danger col-4 mt-5" role="alert" id="errorAlert" style="display: none;">
                    <strong>Error!</strong> <span id="errorText"></span>
                </div>
                <div class="alert alert-success col-4 mt-5" role="alert" id="successAlert" style="display: none;">
                    <strong>Success!</strong> <span id="successText"></span>

                </div>
            </div>
        </div>


    </div>



    <div class="row footer">
        <img src="{{url_for('static', filename='images/loginPageBackground.webp')}}" alt="footer" class="img-fluid">
    </div>




</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
    integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
    crossorigin="anonymous"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<!-- <script type="module" src="{{url_for('static', filename='js/showNotification.js')}}">    </script> -->
<script type="module" src="{{url_for('static', filename='js/login.js')}}">    </script>

<!-- <script type="module" src="{{url_for('static', filename='js/login.js')}}">    </script> -->



</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Website{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{url_for('static', filename='images/voting_portal.png')}}">
    {% block css %} {% endblock %}
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/user/profile.css') }}">

</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        
        <div class="row list-unstyled components mt-1">
            <div class="col-3">
                <i class="bi bi-clipboard-data"></i>
                <a class="navbar-brand bi bi-clipboard-data" href="/user/profile">
                    <!-- <img src="{{url_for('static', filename='images/voting_portal.png')}}" width="30" height="30" class="d-inline-block align-top" alt="Election Committee Logo"> -->
                    Election Committee
                </a>
            </div>
            <div class="col-3"></div>
         
           
           
          
        </div>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
      
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <div class="ms-auto">
                        <div class="container">
                            <button class="btn  voting-portal-tab " type="button" id="votingResultTab"
                               >
                               <a class="text-white text-decoration-none" href="{{ url_for('users.get_result') }}"><i class="fas fa-user me-2"></i>Voting Result</a>
                            </button>
                            
                        </div>
                    </div>
                </li>

                <li class="nav-item">
                    <div class="ms-auto">
                        <div class="dropdown">
                            <button class="btn btn-secondary  dropdown-toggle" type="button" id="userDropdown"
                                data-bs-toggle="dropdown">
                                <i class="fas fa-user me-2"></i>{{userRecord[1]~ ' ' ~userRecord[2]}}
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end">

                                <li><a class="dropdown-item" href="{{ url_for('login.logout') }}"><i
                                            class="fas fa-sign-out-alt me-2"></i>Logout</a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </li>
            </ul>
        </div>
    </nav>
    {% block content %} <!-- Child templates will override this block --> {% endblock %}

    <div class="row  flex-row-reverse justify-content-start" style=" z-index: 1000;">
        <div class="alert alert-danger col-3 mt-5 text-left" role="alert" id="errorAlert" style="display: none;">
            <strong>Error!</strong> <span id="errorText"></span>
          </div>
          <div class="alert alert-success col-3 mt-5" role="alert" id="successAlert" style="display: none;">
            <strong>Success!</strong> <span id="successText"></span>

          </div>
    </div>
    <input type="hidden" name="list" id="cnd_p" value="{{candidatePosition}}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
        integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
        crossorigin="anonymous"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script> -->
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type="module" src="{{url_for('static', filename='js/users/profile.js')}}">    </script>

    {% block Scripts %} {% endblock %}

</body>

</html>
